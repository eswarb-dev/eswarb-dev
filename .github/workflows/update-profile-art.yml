name: Update profile art

on:
  schedule:
    - cron: "17 2 * * *"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  update:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.x"

      - name: Install scraper dependencies
        run: python -m pip install -r scripts/requirements.txt

      - name: Fetch contributions
        env:
          GH_PROFILE_USER: eswarb-dev
        run: python scripts/fetch_contributions.py

      - name: Render heatmap
        run: python scripts/render_heatmap_svg.py

      - name: Commit updated heatmap
        uses: stefanzweifel/git-auto-commit-action@v5
        with:
          commit_message: Update contribution heatmap
          file_pattern: contrib-heatmap.svg data/contributions.json
